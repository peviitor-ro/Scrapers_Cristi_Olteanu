name: General point run Scrapers

on:
  schedule:
    - cron: '00 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.repository.fork == false }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenCode
        run: |
          OPENCODE_TMP_DIR="$(mktemp -d)"
          curl -L "https://github.com/anomalyco/opencode/releases/latest/download/opencode-linux-x64.tar.gz" -o "$OPENCODE_TMP_DIR/opencode.tar.gz"
          tar -xzf "$OPENCODE_TMP_DIR/opencode.tar.gz" -C "$OPENCODE_TMP_DIR"
          sudo install "$OPENCODE_TMP_DIR/opencode" /usr/local/bin/opencode
          rm -rf "$OPENCODE_TMP_DIR"

      - name: All scrapers runs
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python sites/A_OOI_main.py

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update scraper outputs"
          git push
